# Yutubo backend — nginx reverse proxy (Oracle Cloud)
#
# Install: copy to /etc/nginx/sites-available/yutubo, then
#   sudo ln -s /etc/nginx/sites-available/yutubo /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d api.your-domain.com   # obtains the SSL cert below
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace `api.your-domain.com` with your actual API hostname.

# Redirect HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.your-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.your-domain.com;

    # Managed by certbot (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/api.your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.your-domain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Allow large cookies.txt uploads (matches MAX_COOKIE_BYTES default 1 MB, with headroom)
    client_max_body_size 4M;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / upgrade passthrough (harmless for plain HTTP too)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # CRITICAL: disable buffering so SSE progress and file streaming reach
        # the client in real time. Without this, nginx buffers the response and
        # /api/progress/:id never streams.
        proxy_buffering    off;
        proxy_cache_bypass $http_upgrade;

        # Long timeouts: 4K/1080p downloads can take several minutes.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
